{% extends "base.html" %}
{% block title %}崇拜講道{% endblock %}

{% block content %}
<section id="showcase-inner" class="py-5 text-white">
  <div class="container text-center">
    <h3 class="display-4">崇拜講道</h3>
    <p class="lead">聚會重温</p>
  </div>
</section>

<section id="bc" class="mt-3">
  <div class="container">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item">
          <a href="{% url 'indexes:home' %}"><i class="fas fa-home"></i> Home</a>
        </li>
        <li class="breadcrumb-item active">崇拜講道</li>
      </ol>
    </nav>
  </div>
</section>

<section id="listings" class="py-4">
  <div class="container">
    <h3>講道重溫</h3>

    <!-- Filters -->
    <div class="filter-section mb-3">
      <label for="year-selector">篩選日期：</label>
          <select id="year-selector" onchange="filterSermons()">
          <option value="">所有日期</option>
          {% for year in years %}
          <option value="{{ year }}">{{ year }}年</option>
          {% endfor %}
      </select>

        <label for="year-selector">篩選講員：</label>
          <select id="speaker_name-selector" onchange="filterSermons()">
        <option value="">所有講員</option>
        {% for speaker_name in speaker_names %}
        <option value="{{ speaker_name }}">{{ speaker_name }}</option>
        {% endfor %}
    </select>
    </div>

    <!-- Sermons Table -->
    <div class="table-responsive">
      <table id="sermons-table" class="table table-hover table-striped">
        <thead>
          <tr>
            <th>講道日期</th>
            <th>講道題目</th>
            <th>講員</th>
            <th>影片</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</section>
{% endblock %}

{% block extra_js %}
<script>

window.filterSermons = function() {
    const year = document.getElementById('year-selector').value;
    const speaker = document.getElementById('speaker_name-selector').value;

    let params = [];
    if (year) params.push(`year=${encodeURIComponent(year)}`);
    if (speaker) params.push(`speaker_name=${encodeURIComponent(speaker)}`);

    let url = "{% url 'worships:sermons_api' %}";
    if (params.length) {
        url += '?' + params.join('&');
    }

    fetch(url)
        .then(res => res.json())
        .then(data => renderTable(data.sermons));
};

function renderTable(sermons) {
    const tbody = document.querySelector('#sermons-table tbody');
    tbody.innerHTML = '';

    if (!sermons.length) {
        tbody.innerHTML = '<tr><td colspan="4">暫無講道資料</td></tr>';
        return;
    }

    sermons.forEach(s => {
        tbody.innerHTML += `
            <tr>
                <td>${s.sermon_date}</td>
                <td>${s.sermon_title}</td>
                <td>${s.speaker_name}</td>
                <td>
                    <a href="${s.youtube_link}" target="_blank" class="btn btn-danger btn-sm">
                        ▶ 觀看
                    </a>
                </td>
            </tr>
        `;
    });
};

document.addEventListener('DOMContentLoaded', filterSermons);
</script>
{% endblock %}
